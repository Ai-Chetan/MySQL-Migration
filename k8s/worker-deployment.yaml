apiVersion: apps/v1
kind: Deployment
metadata:
  name: migration-worker
  namespace: migration-platform
  labels:
    app: migration-worker
    tier: worker
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: migration-worker
  template:
    metadata:
      labels:
        app: migration-worker
        tier: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: migration-worker-sa
      containers:
      - name: worker
        image: migration-platform/worker:5.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: metrics
          containerPort: 9091
          protocol: TCP
        env:
        - name: METADATA_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: migration-secrets
              key: db-password
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: migration-secrets
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: migration-secrets
              key: s3-secret-key
        - name: WORKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        envFrom:
        - configMapRef:
            name: migration-config
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "4000m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "test -f /tmp/worker-alive || exit 1"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "test -f /tmp/worker-ready || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: worker-data
          mountPath: /tmp/worker-data
      volumes:
      - name: worker-data
        emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: migration-worker-hpa
  namespace: migration-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: migration-worker
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  # Custom metric for Kafka lag (requires metrics server)
  - type: Pods
    pods:
      metric:
        name: kafka_consumer_lag
      target:
        type: AverageValue
        averageValue: "1000"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 5
        periodSeconds: 30
      - type: Percent
        value: 100
        periodSeconds: 30
      selectPolicy: Max
