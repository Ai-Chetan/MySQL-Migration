apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-api-sa
  namespace: migration-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-worker-sa
  namespace: migration-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migration-api-role
  namespace: migration-platform
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migration-api-rolebinding
  namespace: migration-platform
subjects:
- kind: ServiceAccount
  name: migration-api-sa
  namespace: migration-platform
roleRef:
  kind: Role
  name: migration-api-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migration-worker-role
  namespace: migration-platform
rules:
- apiGroups: [""]
  resources: ["pods", "configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migration-worker-rolebinding
  namespace: migration-platform
subjects:
- kind: ServiceAccount
  name: migration-worker-sa
  namespace: migration-platform
roleRef:
  kind: Role
  name: migration-worker-role
  apiGroup: rbac.authorization.k8s.io
